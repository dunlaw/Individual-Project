        uses: actions/cache@v4
        with:
          path: .godot
          key: godot-${{ runner.os }}-${{ env.GODOT_VERSION_FULL }}-${{ hashFiles('1.Codebase/**/*.gd', '1.Codebase/**/*.import') }}
          restore-keys: |
