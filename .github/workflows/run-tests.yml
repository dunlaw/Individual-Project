name: Run Unit Tests

on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6.1"
  GODOT_VERSION_FULL: "4.6.1-stable"

jobs:
  unit-tests:
    name: Run Unit Tests & Sync Assets
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: false
          fetch-depth: 0 # 確保能進行 Git Push

      - name: Cache Godot data
        id: cache-import
        uses: actions/cache@v4
        with:
          path: .godot
          key: godot-${{ runner.os }}-${{ env.GODOT_VERSION_FULL }}-${{ hashFiles('1.Codebase/**/*.gd', '1.Codebase/**/*.csv') }}
          restore-keys: |
            godot-${{ runner.os }}-${{ env.GODOT_VERSION_FULL }}-

      - name: Setup Godot
        uses: ./.github/actions/setup-godot
        with:
          godot-version: ${{ env.GODOT_VERSION }}
          godot-version-full: ${{ env.GODOT_VERSION_FULL }}

      # 強制導入資源，這會產生 .import 和 .translation 檔案
      - name: Force Import Assets (Headless)
        run: |
          echo "Importing project assets to generate .import and .translation files..."
          # 執行兩次以確保依賴鏈（如 CSV -> Translation）完全正確
          ./godot_executable --headless --editor --quit --path . || true
          ./godot_executable --headless --editor --quit --path . || true
          echo "Import complete."

      # 自動檢測並提交缺失的 .import 和 .translation 檔案
      - name: Auto-Commit Missing Assets
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          echo "Checking for auto-generated files (.import, .translation)..."
          
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 強制添加所有生成的資源檔
          git add -f "1.Codebase/**/*.import"
          git add -f "1.Codebase/**/*.translation" 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "✅ No missing .import or .translation files found. Repository is clean."
          else
            echo "⚠️ Found missing assets! Committing to branch..."
            git commit -m "chore: auto-sync generated import metadata and translations [skip ci]"
            git push origin HEAD
          fi

      - name: Create test output directory
        run: mkdir -p test-results

      # 使用場景運行測試，確保 AutoLoads (全域腳本) 正常載入
      - name: Run all unit tests
        id: run-tests
        run: |
          echo "Running all unit tests via all_tests_runner.tscn..."
          echo "============================================"

          timeout 300 ./godot_executable --headless --path . "res://1.Codebase/src/scenes/tests/all_tests_runner.tscn" 2>&1 | tee test-results/test-output.log
          TEST_EXIT_CODE=${PIPESTATUS[0]}
          echo "test_exit_code=$TEST_EXIT_CODE" >> $GITHUB_OUTPUT
          echo "Test execution completed with exit code: $TEST_EXIT_CODE"
        continue-on-error: true

      - name: Parse test results
        id: parse-results
        run: |
          echo "Parsing test results..."
          OUTPUT_FILE="test-results/test-output.log"
          SUMMARY_FILE="test-results/summary.md"

          echo "# 🧪 Test Results Summary" > $SUMMARY_FILE
          echo "" >> $SUMMARY_FILE
          echo "**Branch:** \`${{ github.ref_name }}\` | **Commit:** \`${{ github.sha }}\`" >> $SUMMARY_FILE
          echo "" >> $SUMMARY_FILE

          if [ ! -f "$OUTPUT_FILE" ]; then
            echo "❌ CRITICAL: Test output log missing!" >> $SUMMARY_FILE
            exit 1
          fi

          # Extract counts from the FINAL TEST SUMMARY lines emitted by all_tests_runner.gd
          PASSED_TESTS=$(grep -E "^\s+Passed\s+:" "$OUTPUT_FILE" | grep -oE '[0-9]+' | head -1)
          FAILED_TESTS=$(grep -E "^\s+Failed\s+:" "$OUTPUT_FILE" | grep -oE '[0-9]+' | head -1)
          TOTAL_TESTS=$(grep -E "^\s+Total assertions\s+:" "$OUTPUT_FILE" | grep -oE '[0-9]+' | head -1)

          # Default to 0 if grep found no matches (head -1 exits 0 even on empty input,
          # so "|| echo 0" never triggered — use parameter expansion instead)
          PASSED_TESTS=${PASSED_TESTS:-0}
          FAILED_TESTS=${FAILED_TESTS:-0}
          TOTAL_TESTS=${TOTAL_TESTS:-0}

          echo "## Statistics" >> $SUMMARY_FILE
          echo "| Metric | Value |" >> $SUMMARY_FILE
          echo "|--------|-------|" >> $SUMMARY_FILE
          echo "| Total Tests | $TOTAL_TESTS |" >> $SUMMARY_FILE
          echo "| ✅ Passed | $PASSED_TESTS |" >> $SUMMARY_FILE
          echo "| ❌ Failed | $FAILED_TESTS |" >> $SUMMARY_FILE

          if [ "$TOTAL_TESTS" -gt 0 ]; then
            # 計算成功率
            PASS_RATE=$(awk "BEGIN {printf \"%.1f%%\", ($PASSED_TESTS / $TOTAL_TESTS) * 100}")
            echo "| Pass Rate | $PASS_RATE |" >> $SUMMARY_FILE
          fi

          GODOT_EXIT="${{ steps.run-tests.outputs.test_exit_code }}"
          if [ "$FAILED_TESTS" -gt 0 ] || [ "$GODOT_EXIT" = "1" ] || [ "$GODOT_EXIT" = "124" ]; then
            echo "test_status=failure" >> $GITHUB_OUTPUT
            echo "## ❌ Failures Detected" >> $SUMMARY_FILE
            grep -E "^\s+FAIL\s+" "$OUTPUT_FILE" | head -20 >> $SUMMARY_FILE || true
          elif [ "$TOTAL_TESTS" -eq 0 ]; then
            echo "test_status=error" >> $GITHUB_OUTPUT
            echo "## ⚠️ Warning: No tests detected in output!" >> $SUMMARY_FILE
          else
            echo "test_status=success" >> $GITHUB_OUTPUT
            echo "## ✅ All Tests Passed!" >> $SUMMARY_FILE
          fi

          echo "" >> $SUMMARY_FILE
          echo "<details><summary>View Full Logs</summary>" >> $SUMMARY_FILE
          echo "" >> $SUMMARY_FILE
          echo '```' >> $SUMMARY_FILE
          cat "$OUTPUT_FILE" >> $SUMMARY_FILE
          echo '```' >> $SUMMARY_FILE
          echo "</details>" >> $SUMMARY_FILE

      - name: Add summary to GitHub Job
        if: always()
        run: cat test-results/summary.md >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('test-results/summary.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            })

      - name: Final Status Check
        if: always()
        run: |
          if [ "${{ steps.parse-results.outputs.test_status }}" != "success" ]; then
            echo "Tests did not pass. Failing workflow."
            exit 1
          fi